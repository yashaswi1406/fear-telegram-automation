name: Telegram Bot Auto Run

on:
  schedule:
    - cron: "0 3 * * *"   # runs once daily (UTC time)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run bot for 6 hours
      run: timeout 21600 python main.py
